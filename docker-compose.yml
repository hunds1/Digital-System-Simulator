services:
  db:
    image: postgres:16-alpine
    container_name: dss-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-simulator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-simulator}
      POSTGRES_DB: ${POSTGRES_DB:-simulator}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-simulator} -d ${POSTGRES_DB:-simulator}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dss-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-simulator}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-simulator}
      DB_NAME: ${POSTGRES_DB:-simulator}
      DATABASE_URL: postgresql://${POSTGRES_USER:-simulator}:${POSTGRES_PASSWORD:-simulator}@db:5432/${POSTGRES_DB:-simulator}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
